---
# The catalog for intended distribution.
# Can be either "certified-operators" or "redhat-marketplace"
organization: redhat-marketplace

# tests to ignore for certain partners (until static checker's bugs are fixed):
tests:
  - name: check_operator_name
    ignore_operators:
      - ^couchbase-enterprise-certified-rhmp
      - ^crunchy-postgres-operator-rhmp
      - ^dynatrace-operator-rhmp
      - ^falcon-operator-rhmp
      - ^instana-agent-operator-rhmp
      - ^sumologic-kubernetes-collection-helm-operator-rhmp
  - name: check_bundle_higher_than_channel_head
    ignore_operators:
      - ^instana-agent-operator-rhmp

index_image:
  repository: quay.io/redhat/redhat----redhat-marketplace-index
  pending_repository: quay.io/redhat/redhat----redhat-marketplace-index-pending
  public_repository_mirror: registry.redhat.io/redhat/redhat-marketplace-index
